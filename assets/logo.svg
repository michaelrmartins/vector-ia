<svg width="320" height="240" viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117"/>

  <!-- Outer rotating arc (blue) -->
  <circle cx="160" cy="110" r="80"
          fill="none"
          stroke="#4a78a8"
          stroke-width="12"
          stroke-dasharray="180 100">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 160 110"
                      to="360 160 110"
                      dur="12s"
                      repeatCount="indefinite"/>
  </circle>

  <!-- Inner arc (black, static) -->
  <circle cx="160" cy="110" r="60"
          fill="none"
          stroke="#000000"
          stroke-width="10"
          stroke-dasharray="140 80"/>

  <!-- Eye base -->
  <ellipse cx="160" cy="110" rx="40" ry="25"
           fill="#0d1117"
           stroke="#00f7ff"
           stroke-width="1.5"/>

  <!-- Iris glow -->
  <circle cx="160" cy="110" r="14" fill="#00f7ff" opacity="0.8">
    <animate attributeName="r" values="13;16;13" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Pupil -->
  <circle cx="160" cy="110" r="6" fill="#0d1117"/>

  <!-- Scanning ring -->
  <circle cx="160" cy="110" r="30"
          fill="none"
          stroke="#00f7ff"
          stroke-width="1"
          opacity="0.4">
    <animate attributeName="r" values="30;45;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Particles (data / embeddings) -->
  <g fill="#00f7ff">
    <circle cx="100" cy="60" r="2">
      <animate attributeName="cy" values="60;160;60" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="70" r="2">
      <animate attributeName="cy" values="70;150;70" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="170" r="2">
      <animate attributeName="cy" values="170;80;170" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="2">
      <animate attributeName="cy" values="150;90;150" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="160" y="210"
        text-anchor="middle"
        fill="#4a78a8"
        font-size="16"
        font-family="monospace">
    Vector-IA
  </text>

</svg>
