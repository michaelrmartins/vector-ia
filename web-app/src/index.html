<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Terminal | AI</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #00e676; }
        .container { display: flex; gap: 20px; width: 100%; max-width: 1000px; margin-top: 20px; }
        .video-panel, .info-panel { background-color: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); flex: 1; }
        .status { margin-top: 15px; padding: 15px; border-radius: 8px; background-color: #2c2c2c; font-size: 1.1em; display: none; }
        .status.success { background-color: #1b5e20; color: #a5d6a7; display: block; border: 1px solid #4caf50; }
        .log-box { margin-top: 20px; background: #000; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.9em; border-radius: 5px; color: #aaa; }
        /* Passive stream viewer */
        .stream-wrapper { position: relative; width: 100%; padding-top: 56.25%; /* 16:9 */ background: #000; border-radius: 8px; overflow: hidden; }
        .stream-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .stream-wrapper canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>

    <h1>Attendance Terminal</h1>

    <div class="container">
        <div class="video-panel">
            <!-- Passive Go2RTC stream viewer -->
            <div class="stream-wrapper">
                <iframe
                    id="streamFrame"
                    src="http://192.168.2.215:1984/stream.html?src=camera4"
                    allowfullscreen
                ></iframe>
                <canvas id="overlayCanvas"></canvas>
            </div>
        </div>

        <div class="info-panel">
            <h3>Last Record</h3>
            <div id="resultadoBox" class="status">
                Waiting for recognition...
            </div>

            <h3>System Logs</h3>
            <div id="logArea" class="log-box">
                > System started. Listening for recognition events...<br>
            </div>
        </div>
    </div>

    <script>
        const socket = io("http://localhost:3000");

        const resultadoBox = document.getElementById('resultadoBox');
        const logArea = document.getElementById('logArea');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');

        function log(msg) {
            logArea.innerHTML += `> ${msg}<br>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // Draw a bounding box on the overlay canvas.
        // box coords are in the original frame's pixel space; scale to display size.
        function drawBox(box, frameWidth, frameHeight, label, color) {
            const displayW = overlayCanvas.offsetWidth;
            const displayH = overlayCanvas.offsetHeight;

            // Set canvas backing resolution to match its CSS display size
            overlayCanvas.width = displayW;
            overlayCanvas.height = displayH;
            overlayCtx.clearRect(0, 0, displayW, displayH);

            // Scale factors (if frame dims are unknown, use 1:1)
            const scaleX = frameWidth  ? displayW / frameWidth  : 1;
            const scaleY = frameHeight ? displayH / frameHeight : 1;

            const x      = box.left   * scaleX;
            const y      = box.top    * scaleY;
            const width  = (box.right  - box.left) * scaleX;
            const height = (box.bottom - box.top)  * scaleY;

            overlayCtx.strokeStyle = color;
            overlayCtx.lineWidth = 3;
            overlayCtx.strokeRect(x, y, width, height);

            if (label) {
                overlayCtx.fillStyle = color;
                overlayCtx.font = "bold 16px monospace";
                overlayCtx.fillText(label, x, y - 8);
            }
        }

        function clearOverlay() {
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }

        // ==========================================
        // 1. MATCH: High-confidence recognition
        // ==========================================
        socket.on('presenca_confirmada', (dados) => {
            log(`MATCH FOUND! ${dados.nome} (${(dados.confidence * 100).toFixed(1)}%)`);

            resultadoBox.className = "status success";
            resultadoBox.innerHTML = `
                <strong>Name:</strong> ${dados.nome} <br>
                <strong>Document:</strong> ${dados.documento || '—'} <br>
                <strong>Status:</strong> Access Granted
            `;

            if (dados.box) {
                const label = `${dados.nome.split(' ')[0]} — ${(dados.confidence * 100).toFixed(0)}%`;
                drawBox(dados.box, dados.frame_width, dados.frame_height, label, "#00FF00");
            }

            setTimeout(() => {
                resultadoBox.className = "status";
                resultadoBox.innerHTML = "Waiting for recognition...";
                clearOverlay();
            }, 3000);
        });

        // ==========================================
        // 2. SCANNING: Face detected, not yet identified
        // ==========================================
        socket.on('rosto_detectado', (dados) => {
            if (dados.box) {
                drawBox(dados.box, dados.frame_width, dados.frame_height, "Analisando biometria...", "#00FF00");
            }
        });

        log("Socket connected. Waiting for server events.");
    </script>
</body>
</html>
