<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronismo ETL - AI Facial</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .admin-panel {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 900px;
        }
        h1 {
            margin-top: 0;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            font-size: 24px;
        }
        .info {
            color: #aaaaaa;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 180px;
            padding: 15px 20px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #btnDelta {
            background-color: #00e676;
            color: #000;
        }
        #btnDelta:hover:not(:disabled) { background-color: #00c853; }

        #btnFull {
            background-color: #2979ff;
            color: #fff;
        }
        #btnFull:hover:not(:disabled) { background-color: #1565c0; }

        #btnWipe {
            background-color: #d32f2f;
            color: #fff;
        }
        #btnWipe:hover:not(:disabled) { background-color: #b71c1c; }

        #logArea {
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            border-radius: 6px;
            border: 1px solid #333;
            line-height: 1.5;
        }
    </style>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="admin-panel">
        <h1>⚙️ Motor de Sincronismo (ETL)</h1>
        <div class="info">
            Painel de administração da base de vetores biométricos. Use o <strong>Smart Sync</strong> para operações rápidas do dia a dia. Use o <strong>Force Full Sync</strong> para reconstruir toda a base. O <strong>Wipe</strong> é irreversível.
        </div>

        <div class="btn-group">
            <button id="btnDelta" class="btn">⚡ Smart Sync (Delta)</button>
            <button id="btnFull"  class="btn">🔄 Force Full Sync</button>
            <button id="btnWipe"  class="btn">🗑️ Wipe Database</button>
        </div>

        <div id="logArea">
            > Sistema iniciado. Aguardando comando...<br>
        </div>
    </div>

    <script>
        const socket = io("http://localhost:3000");
        const logArea  = document.getElementById('logArea');
        const btnDelta = document.getElementById('btnDelta');
        const btnFull  = document.getElementById('btnFull');
        const btnWipe  = document.getElementById('btnWipe');

        const MAX_LOGS = 200;

        function log(msg) {
            const line = document.createElement('div');
            line.textContent = `> ${msg}`;
            line.style.marginBottom = "3px";
            logArea.appendChild(line);

            // Ring buffer: discard oldest entries beyond MAX_LOGS
            while (logArea.children.length > MAX_LOGS) {
                logArea.removeChild(logArea.firstChild);
            }

            logArea.scrollTop = logArea.scrollHeight;
        }

        function setAllDisabled(disabled) {
            btnDelta.disabled = disabled;
            btnFull.disabled  = disabled;
            btnWipe.disabled  = disabled;
        }

        async function triggerSync(mode) {
            setAllDisabled(true);
            log(`==================================================`);
            log(`🚀 INICIANDO SINCRONISMO (${mode.toUpperCase()})`);
            log(`==================================================`);

            try {
                await fetch('http://localhost:3000/api/sincronizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode })
                });
            } catch (err) {
                log(`❌ Erro ao chamar a API: ${err.message}`);
                setAllDisabled(false);
            }
            // Buttons re-enable via sync_log listener when process completes
        }

        btnDelta.addEventListener('click', () => {
            if (confirm("Iniciar Smart Sync (Delta)? Apenas diferenças serão processadas.")) {
                triggerSync('delta');
            }
        });

        btnFull.addEventListener('click', () => {
            if (confirm("Iniciar Full Sync? Toda a base será reprocessada. Isso pode demorar bastante.")) {
                triggerSync('full');
            }
        });

        btnWipe.addEventListener('click', async () => {
            if (!confirm("⚠️ ATENÇÃO: Isso vai apagar TODOS os vetores biométricos do banco.\n\nEsta ação é irreversível. Deseja continuar?")) {
                return;
            }
            setAllDisabled(true);
            log("🗑️ Enviando comando de limpeza total...");

            try {
                const res = await fetch('http://localhost:3000/api/limpar-base', { method: 'POST' });
                const json = await res.json();
                log(res.ok ? `✅ ${json.message}` : `❌ ${json.error}`);
            } catch (err) {
                log(`❌ Erro ao limpar base: ${err.message}`);
            } finally {
                setAllDisabled(false);
            }
        });

        // Real-time log stream from backend
        socket.on('sync_log', (msg) => {
            log(msg);

            // Re-enable buttons when a sync operation finishes
            if (
                msg.includes('concluído') ||
                msg.includes('Erro fatal no sincronismo')
            ) {
                setAllDisabled(false);
            }
        });
    </script>

</body>
</html>
