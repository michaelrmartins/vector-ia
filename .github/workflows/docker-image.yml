name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Login to Docker Hub using the credentials stored in GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push the Docker image to Docker Hub - ai-service
      - name: Build and Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/attendance-ai:latest

      # Build and push the Docker image to Docker Hub - backend-node
      - name: Build and Push Backend Node
        uses: docker/build-push-action@v5
        with:
          context: ./backend-node
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend-node:latest

      # Build and push the Docker image to Docker Hub - web-app
      - name: Build and Push Web App
        uses: docker/build-push-action@v5
        with:
          context: ./web-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/attendance-web-app:latest